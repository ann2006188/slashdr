spring.application.name=backend

# --- Database connection ---
# DB_USERNAME / DB_PASSWORD can be set as environment variables so real
# credentials never get committed to git. If not set, defaults to root/no-password.
spring.datasource.url=jdbc:mysql://localhost:3306/slashdr_compliance?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=lenovo2006188
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
# update = Hibernate creates/adjusts tables automatically based on our @Entity classes.
# Good for this early prototyping stage. We'll switch to Flyway migrations
# once the schema stabilizes (matches the "migrations" task in the project doc).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

# --- File uploads (Module C.1: secure document storage) ---
# Spring's own default limit is 1MB - raising it so our controller's 5MB
# check is the one that actually decides, not Spring silently rejecting first.
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB