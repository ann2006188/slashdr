<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users - SlashDR Compliance</title>
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/components.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar placeholder -->
        <aside id="sidebar-container"></aside>
        
        <!-- Main Area -->
        <main class="main-content">
            <!-- Header placeholder -->
            <header id="header-container"></header>
            
            <!-- Page Contents -->
            <div id="page-content" class="animate-slide-up" style="display: none;">
                
                <!-- Actions Bar -->
                <div class="flex justify-between items-center" style="margin-bottom: 2rem;">
                    <div>
                        <h2 style="font-size: 1.25rem; font-weight: 700; color: var(--text-primary);">System User Directory</h2>
                        <p style="font-size: 0.875rem; color: var(--text-secondary);">Manage authentication, roles, and clinic assignments.</p>
                    </div>
                    <button class="btn btn-primary" id="btn-add-user-trigger">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        <span>Add User</span>
                    </button>
                </div>

                <!-- Users Table -->
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Username</th>
                                <th>Role</th>
                                <th>Clinic Scope</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="users-tbody">
                            <!-- Populated dynamically -->
                        </tbody>
                    </table>
                </div>

            </div>
        </main>
    </div>

    <!-- DRAWER: Add User -->
    <div class="drawer" id="add-user-drawer" style="max-width: 500px;">
        <div class="drawer-header">
            <h3 class="modal-title">Create System User</h3>
            <button class="modal-close" id="btn-close-add-drawer">&times;</button>
        </div>
        <form id="add-user-form" style="display: flex; flex-direction: column; height: calc(100% - 70px);">
            <div class="drawer-body flex flex-col gap-4">
                <div class="form-group">
                    <label class="form-label" for="add-full-name">Full Name *</label>
                    <input type="text" id="add-full-name" class="form-input" placeholder="e.g. Dr. Jane Foster" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="add-username">Username *</label>
                    <input type="text" id="add-username" class="form-input" placeholder="e.g. janefoster" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="add-password">Password *</label>
                    <input type="password" id="add-password" class="form-input" placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="add-role">System Role *</label>
                    <select id="add-role" class="form-input" required>
                        <option value="ROLE_STAFF">Staff (ROLE_STAFF)</option>
                        <option value="ROLE_DOCTOR">Doctor (ROLE_DOCTOR)</option>
                        <option value="ROLE_CLINIC_ADMIN">Clinic Admin (ROLE_CLINIC_ADMIN)</option>
                        <option value="ROLE_SUPER_ADMIN">Super Admin (ROLE_SUPER_ADMIN)</option>
                    </select>
                </div>

                <div class="form-group" id="add-clinic-block">
                    <label class="form-label" for="add-clinic-id">Clinic Assignment *</label>
                    <select id="add-clinic-id" class="form-input">
                        <option value="clinic-001">Sunrise Medical Centre (clinic-001)</option>
                        <option value="clinic-002">Horizon Healthcare (clinic-002)</option>
                        <option value="clinic-003">Apex Medical Group (clinic-003)</option>
                    </select>
                </div>
            </div>
            <div class="drawer-footer">
                <button type="button" class="btn btn-secondary" id="btn-cancel-add">Cancel</button>
                <button type="submit" class="btn btn-primary">Create User</button>
            </div>
        </form>
    </div>

    <!-- DRAWER: Edit User -->
    <div class="drawer" id="edit-user-drawer" style="max-width: 500px;">
        <div class="drawer-header">
            <h3 class="modal-title">Edit System User</h3>
            <button class="modal-close" id="btn-close-edit-drawer">&times;</button>
        </div>
        <form id="edit-user-form" style="display: flex; flex-direction: column; height: calc(100% - 70px);">
            <input type="hidden" id="edit-user-id">
            <div class="drawer-body flex flex-col gap-4">
                <div class="form-group">
                    <label class="form-label" for="edit-full-name">Full Name *</label>
                    <input type="text" id="edit-full-name" class="form-input" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="edit-role">System Role *</label>
                    <select id="edit-role" class="form-input" required>
                        <option value="ROLE_STAFF">Staff (ROLE_STAFF)</option>
                        <option value="ROLE_DOCTOR">Doctor (ROLE_DOCTOR)</option>
                        <option value="ROLE_CLINIC_ADMIN">Clinic Admin (ROLE_CLINIC_ADMIN)</option>
                        <option value="ROLE_SUPER_ADMIN">Super Admin (ROLE_SUPER_ADMIN)</option>
                    </select>
                </div>

                <div class="form-group" id="edit-clinic-block">
                    <label class="form-label" for="edit-clinic-id">Clinic Assignment *</label>
                    <select id="edit-clinic-id" class="form-input">
                        <option value="clinic-001">Sunrise Medical Centre (clinic-001)</option>
                        <option value="clinic-002">Horizon Healthcare (clinic-002)</option>
                        <option value="clinic-003">Apex Medical Group (clinic-003)</option>
                    </select>
                </div>
            </div>
            <div class="drawer-footer">
                <button type="button" class="btn btn-secondary" id="btn-cancel-edit">Cancel</button>
                <button type="submit" class="btn btn-primary">Save Changes</button>
            </div>
        </form>
    </div>

    <!-- MODAL POPUP: Reset Password -->
    <div class="modal-backdrop" id="reset-modal-backdrop">
        <div class="modal-dialog animate-slide-up" style="max-width: 400px;">
            <div class="modal-header">
                <h3 class="modal-title">Reset User Password</h3>
                <button class="modal-close" id="btn-close-reset-modal">&times;</button>
            </div>
            <form id="reset-password-form">
                <input type="hidden" id="reset-user-id">
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label class="form-label" for="reset-new-password">New Password *</label>
                    <input type="password" id="reset-new-password" class="form-input" placeholder="••••••••" required>
                </div>
                <div class="flex justify-end gap-3">
                    <button type="button" class="btn btn-secondary" id="btn-cancel-reset-modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Reset Password</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Backdrop for Drawer modals -->
    <div class="modal-backdrop" id="user-backdrop"></div>

    <script src="/js/app.js"></script>
    <script src="/js/manage-users.js"></script>
</body>
</html>
